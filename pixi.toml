[workspace]
name = "hyperspy-proposals"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.10"
nodejs = ">=20"
pyyaml = "*"
lychee = "0.23.0"
pre-commit = "*"

[tasks]
install = "npm install"
lint = "./node_modules/.bin/markdownlint ."
fix = "./node_modules/.bin/markdownlint --fix ."
links = "lychee --require-https ."
frontmatter = "python .github/scripts/validate-frontmatter.py"
check = { depends-on = ["frontmatter", "lint", "links"] }
pre-commit = "pre-commit run --all-files"
