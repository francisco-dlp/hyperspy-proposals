default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        name: markdownlint
        args: ["--fix"]
  - repo: local
    hooks:
      - id: validate-frontmatter
        name: Validate proposal frontmatter
        entry: python .github/scripts/validate-frontmatter.py
        language: system
        files: '^[0-9]{4}-.*\.md$'
        pass_filenames: false
      - id: check-ai-co-author
        name: Block Co-authored-by AI trailers
        entry: scripts/check-ai-co-author.py
        language: script
        stages: [commit-msg]
        always_run: true
